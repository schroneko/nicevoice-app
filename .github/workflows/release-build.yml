name: Release Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version
        required: true
        type: string
      notarize:
        description: Submit for notarization
        required: false
        default: true
        type: boolean

jobs:
  release:
    runs-on: macos-26
    permissions:
      contents: read

    env:
      APP_NAME: NiceVoice

    steps:
      - uses: actions/checkout@v6

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install Mint
        run: brew install mint

      - name: Import Developer ID certificate
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "${BUILD_CERTIFICATE_BASE64}" ]]; then
            echo "BUILD_CERTIFICATE_BASE64 secret is required" >&2
            exit 1
          fi

          CERT_PATH="$RUNNER_TEMP/build_certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"

          echo -n "${BUILD_CERTIFICATE_BASE64}" | base64 --decode -o "${CERT_PATH}"
          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" -P "${P12_PASSWORD}" -A -t cert -f pkcs12 -k "${KEYCHAIN_PATH}"
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"

      - name: Package release app
        env:
          NICEVOICE_SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          NICEVOICE_APPCAST_URL: ${{ secrets.NICEVOICE_APPCAST_URL }}
          NICEVOICE_SPARKLE_PUBLIC_KEY: ${{ secrets.NICEVOICE_SPARKLE_PUBLIC_KEY }}
          NICEVOICE_ENABLE_AUTOMATIC_CHECKS: "YES"
          NICEVOICE_AUTOMATICALLY_UPDATE: "NO"
        run: |
          ./Scripts/package-app.sh \
            --configuration release \
            --version "${{ inputs.version }}" \
            --sign-identity "${NICEVOICE_SIGN_IDENTITY}" \
            --entitlements NiceVoice-release.entitlements

      - name: Create archive
        run: |
          ditto -c -k --keepParent ".build/bundler/${APP_NAME}.app" "${APP_NAME}-${{ inputs.version }}.zip"

      - name: Notarize archive
        if: ${{ inputs.notarize }}
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          ./Scripts/notarize.sh "${APP_NAME}-${{ inputs.version }}.zip" ".build/bundler/${APP_NAME}.app"

      - name: Upload app artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.APP_NAME }}-${{ inputs.version }}
          path: |
            .build/bundler/${{ env.APP_NAME }}.app
            ${{ env.APP_NAME }}-${{ inputs.version }}.zip
