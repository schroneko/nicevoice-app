name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  swift:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show toolchain
        run: swift --version

      - name: Build
        run: swift build --product NiceVoice

      - name: Test
        run: swift test
